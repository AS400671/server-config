    # multihop;
    # authentication not provided on this network
    local role rs_client;

    ipv4 {
        next hop address my_bgpxchg_ipv4;
        import table on;
        import keep filtered;
        import limit limit_ix_v4 action disable;
        receive limit recv_ix_v4 action disable;
        import filter import_default_v4;
        export filter export_default_v4;
    };
}
